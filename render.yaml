services:
  - type: web
    name: qrit-backend
    env: go
    rootDir: backend
    buildCommand: go build -o server ./cmd/server/main.go
    startCommand: ./server
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: qrit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: qrit-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://qrit-backend.onrender.com/api/v1"

databases:
  - name: qrit-db
    databaseName: qrit
    user: qrit
    plan: free
